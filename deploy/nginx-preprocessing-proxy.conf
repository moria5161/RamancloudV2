# RamanCloud V2 preprocessing deployment include.
#
# Installed to:
# /www/server/panel/vhost/nginx/proxy/219.229.100.24/df2757e2069346b5e29bb639873573ce_219.229.100.24.conf
#
# This preserves the legacy Streamlit app at / and serves V2 at /preprocessing/.

#PROXY-START/

location = /preprocessing {
    return 301 /preprocessing/;
}

location ^~ /preprocessing/api/ {
    proxy_pass http://127.0.0.1:5000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 600s;
}

location ^~ /preprocessing/ {
    alias /www/wwwroot/219.229.100.24/preprocessing/;
    try_files $uri $uri/ /preprocessing/index.html;
}

location ^~ / {
    proxy_pass http://219.229.100.24:8501;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header REMOTE-HOST $remote_addr;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}

#PROXY-END/
